syntax="proto2";
package ksearch.pb;
//option cc_enable_arenas = true;

enum ReverseNodeType {
    REVERSE_NODE_NORMAL = 0;
    REVERSE_NODE_DELETE = 1;
};

//--common
message CommonReverseNode
{
    optional bytes key = 1;//must
    required ReverseNodeType flag = 2;//must
    optional float weight = 3;
};
message CommonReverseList
{
    repeated CommonReverseNode reverse_nodes = 1;//must
};


message InvertedTermField {
    optional string field_name = 1;
    // The position of the term within this field; if it appears multiple times,
    // multiple offsets will be recorded.
    repeated uint32 offset = 2;
    // The term's score in this field is not weighted.
    optional float score = 3;
    // Offset-level payloads, the number of which should match the offset.
    repeated bytes payload = 4;
    // In which multi-valued items of this field does this term appear?
    // For example, if the field to be segmented has values [ABC, ACD, XXX, AXX], and the segmented term is: A
    // Then this term appears in [0, 1, 3]
    // NOTE: Currently, this attribute only exists for sug segmentation
    // NOTE2: For single-valued fields, this attribute is [0]
    repeated uint32 multi_value_index = 5;
    // doc-term payload
    optional bytes doc_term_payload = 6;
}

message InvertedTerm {
    required ReverseNodeType flag = 1;//must
    // The word itself; multiple identical terms in a document will be combined into one InvertedTerm.
    optional string term = 2;
    // Fields that appeared in this term
    repeated InvertedTermField field = 3;

    // When a term appears in multiple fields, the highest score is taken.
    // This score calculates the weight of each field.
    optional double score = 4;

}

message KumoReverseList {
    repeated InvertedTerm reverse_nodes = 1;//must
};